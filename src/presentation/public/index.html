<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Processing API</title>
  <meta name="api-key" content="{{API_KEY}}">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Audio Processing API</h1>
      <p>Upload an audio file, apply an effect, download the result</p>
    </header>

    <!-- Upload -->
    <div class="card">
      <h2>Upload</h2>
      <div class="dropzone" id="dropzone">
        <div class="icon" id="dropzone-icon">&#127925;</div>
        <div class="text" id="dropzone-text">Drop an audio file here or click to browse</div>
        <div class="filename" id="dropzone-filename"></div>
      </div>
      <input type="file" id="fileInput" accept="audio/*" hidden>
      <span class="demo-link" id="demoLink">or use a demo tone (3s sine wave)</span>

      <div class="audio-section hidden" id="originalSection">
        <div class="label">Original</div>
        <audio id="originalPlayer"></audio>
        <div class="player" data-for="originalPlayer">
          <button class="play-btn" type="button" aria-label="Play">
            <svg viewBox="0 0 16 16"><polygon class="icon-play" points="4,2 14,8 4,14"/><g class="icon-pause hidden"><rect x="3" y="2" width="4" height="12"/><rect x="9" y="2" width="4" height="12"/></g></svg>
          </button>
          <div class="track">
            <div class="bar-wrap"><div class="bar"></div></div>
            <div class="time">0:00 / 0:00</div>
          </div>
        </div>
      </div>

      <div class="field">
        <label for="effect">Effect</label>
        <select id="effect">
          <option value="NORMALIZE">Normalize</option>
          <option value="REVERB">Reverb</option>
          <option value="ECHO">Echo</option>
          <option value="PITCH_SHIFT">Pitch Shift</option>
          <option value="NOISE_REDUCTION">Noise Reduction</option>
        </select>
      </div>

      <button class="btn" id="uploadBtn" disabled>Upload & Process</button>
      <div class="error-msg" id="uploadError"></div>
    </div>

    <!-- Result -->
    <div class="card hidden" id="result">
      <h2>Result</h2>
      <div id="statusRows"></div>

      <div class="audio-section hidden" id="processedSection">
        <div class="label">Processed</div>
        <audio id="processedPlayer"></audio>
        <div class="player" data-for="processedPlayer">
          <button class="play-btn" type="button" aria-label="Play">
            <svg viewBox="0 0 16 16"><polygon class="icon-play" points="4,2 14,8 4,14"/><g class="icon-pause hidden"><rect x="3" y="2" width="4" height="12"/><rect x="9" y="2" width="4" height="12"/></g></svg>
          </button>
          <div class="track">
            <div class="bar-wrap"><div class="bar"></div></div>
            <div class="time">0:00 / 0:00</div>
          </div>
        </div>
      </div>

      <a class="download-btn hidden" id="downloadLink">Download Processed Audio</a>
    </div>

    <!-- Track list -->
    <div class="card hidden" id="trackListSection">
      <h2>Tracks</h2>
      <div id="trackList"></div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
