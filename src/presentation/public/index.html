<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Processing API</title>
  <meta name="api-key" content="{{API_KEY}}">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Audio Processing API</h1>
      <p>Upload an audio file, apply an effect, download the result</p>
    </header>

    <!-- Upload -->
    <div class="card">
      <h2>Upload</h2>
      <div class="dropzone" id="dropzone">
        <div class="dropzone-icon" id="dropzone-icon">&#127925;</div>
        <div class="dropzone-text" id="dropzone-text">Drop an audio file here or click to browse</div>
        <div class="dropzone-filename" id="dropzone-filename"></div>
      </div>
      <input type="file" id="fileInput" accept="audio/*" hidden>
      <span class="demo-link" id="demoLink">or use a demo tone (3s sine wave)</span>

      <!-- Original audio preview -->
      <div class="audio-section" id="originalSection" style="display:none">
        <div class="audio-label">Original</div>
        <audio id="originalPlayer"></audio>
        <div class="player" data-for="originalPlayer">
          <button class="player-btn play-btn" type="button" aria-label="Play">
            <svg viewBox="0 0 16 16"><polygon class="icon-play" points="4,2 14,8 4,14"/><g class="icon-pause" style="display:none"><rect x="3" y="2" width="4" height="12"/><rect x="9" y="2" width="4" height="12"/></g></svg>
          </button>
          <div class="player-track">
            <div class="player-bar-wrap"><div class="player-bar"></div></div>
            <div class="player-time">0:00 / 0:00</div>
          </div>
        </div>
      </div>

      <div class="field">
        <label for="effect">Effect</label>
        <select id="effect">
          <option value="NORMALIZE">Normalize</option>
          <option value="REVERB">Reverb</option>
          <option value="ECHO">Echo</option>
          <option value="PITCH_SHIFT">Pitch Shift</option>
          <option value="NOISE_REDUCTION">Noise Reduction</option>
        </select>
      </div>

      <button id="uploadBtn" disabled>Upload & Process</button>
      <div class="error-msg" id="uploadError"></div>
    </div>

    <!-- Result -->
    <div class="card" id="result">
      <h2>Result</h2>
      <div id="statusRows"></div>

      <!-- Processed audio preview -->
      <div class="audio-section" id="processedSection" style="display:none">
        <div class="audio-label">Processed</div>
        <audio id="processedPlayer"></audio>
        <div class="player" data-for="processedPlayer">
          <button class="player-btn play-btn" type="button" aria-label="Play">
            <svg viewBox="0 0 16 16"><polygon class="icon-play" points="4,2 14,8 4,14"/><g class="icon-pause" style="display:none"><rect x="3" y="2" width="4" height="12"/><rect x="9" y="2" width="4" height="12"/></g></svg>
          </button>
          <div class="player-track">
            <div class="player-bar-wrap"><div class="player-bar"></div></div>
            <div class="player-time">0:00 / 0:00</div>
          </div>
        </div>
      </div>

      <a class="download-btn" id="downloadLink" style="display:none">Download Processed Audio</a>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
