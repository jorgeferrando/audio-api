apiVersion: apps/v1
kind: Deployment
metadata:
  name: audio-worker
  namespace: audio-api
  labels:
    app: audio-api
    component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: audio-api
      component: worker
  template:
    metadata:
      labels:
        app: audio-api
        component: worker
    spec:
      containers:
        - name: worker
          image: audio-api:latest
          command: ["node", "dist/worker.js"]
          envFrom:
            - configMapRef:
                name: audio-api-config
            - secretRef:
                name: audio-api-secret
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: audio-uploads-pvc
