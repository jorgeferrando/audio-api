## RabbitMQ
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: audio-api
spec:
  replicas: 1
  selector:
    matchLabels: { app: rabbitmq }
  template:
    metadata:
      labels: { app: rabbitmq }
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management-alpine
          ports:
            - containerPort: 5672
            - containerPort: 15672
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: audio-api
spec:
  selector: { app: rabbitmq }
  ports:
    - name: amqp
      port: 5672
    - name: management
      port: 15672

---
## MinIO
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: audio-api
spec:
  replicas: 1
  selector:
    matchLabels: { app: minio }
  template:
    metadata:
      labels: { app: minio }
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args: ["server", "/data", "--console-address", ":9001"]
          ports:
            - containerPort: 9000
            - containerPort: 9001
          env:
            - name: MINIO_ROOT_USER
              value: minioadmin
            - name: MINIO_ROOT_PASSWORD
              value: minioadmin
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: audio-api
spec:
  selector: { app: minio }
  ports:
    - name: api
      port: 9000
    - name: console
      port: 9001
