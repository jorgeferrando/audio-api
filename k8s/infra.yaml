## MongoDB
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: audio-api
spec:
  replicas: 1
  selector:
    matchLabels: { app: mongodb }
  template:
    metadata:
      labels: { app: mongodb }
    spec:
      containers:
        - name: mongodb
          image: mongo:7
          ports: [{ containerPort: 27017 }]
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: audio-api
spec:
  selector: { app: mongodb }
  ports: [{ port: 27017 }]

